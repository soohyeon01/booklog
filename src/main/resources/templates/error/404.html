<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>페이지를 찾을 수 없습니다 - BookLog</title>
</head>
<body>

<header th:replace="~{fragment/base :: mainHeader('🔍 404 Not Found')}"></header>

<main style="text-align: center; padding: 50px 0;">
  <h2 style="color: red;">⚠️ 요청하신 페이지를 찾을 수 없습니다!</h2>
  <p>주소가 정확한지 확인해 보거나 아래 버튼을 눌러 메인 화면으로 돌아가세요.</p>
  <br>
  <button type="button" th:onclick="|location.href='@{/books}'|">🏠 내 서재 메인으로 가기</button>
</main>

<footer th:replace="~{fragment/base :: mainFooter}"></footer>

</body>
</html>
