<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragment/base :: commonHead}">
  <title>책 정보 수정 - BookLog</title>
</head>
<body>

<header th:replace="~{fragment/base :: mainHeader('도서 정보 수정 (v1.2)')}"></header>

<main class="container my-5" style="max-width: 600px;">

  <section class="card shadow-sm p-4">
    <h3 class="mb-4 fw-bold text-dark border-bottom pb-2">기존 정보 수정</h3>

    <form th:action="@{/books/{bookId}/edit(bookId=${book.id})}" method="post">

      <div class="mb-3 bg-light p-2 rounded border d-flex justify-content-between align-items-center">
        <span class="text-secondary fw-semibold">도서 고유 ID</span>
        <span class="badge bg-secondary fs-6"><span th:text="${book.id}">1</span> (수정 불가)</span>
      </div>

      <div class="mb-3">
        <label for="title" class="form-label fw-semibold">제목 <span class="text-danger">*</span></label>
        <input type="text" id="title" name="title" class="form-control" th:value="${book.title}" required>
      </div>

      <div class="mb-3">
        <label for="author" class="form-label fw-semibold">저자</label>
        <input type="text" id="author" name="author" class="form-control" th:value="${book.author}">
      </div>

      <div class="mb-3">
        <label class="form-label d-block fw-semibold">독서 상태</label>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" id="statusWish" name="status" value="WISH" th:checked="${book.status.name() == 'WISH'}">
          <label class="form-check-label" for="statusWish">읽고 싶은 책</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" id="statusReading" name="status" value="READING" th:checked="${book.status.name() == 'READING'}">
          <label class="form-check-label" for="statusReading">읽는 중</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" id="statusDone" name="status" value="DONE" th:checked="${book.status.name() == 'DONE'}">
          <label class="form-check-label" for="statusDone">완독</label>
        </div>
      </div>

      <div class="mb-3">
        <label for="rating" class="form-label fw-semibold">평점</label>
        <select id="rating" name="rating" class="form-select">
          <option value="5" th:selected="${book.rating == 5}">⭐⭐⭐⭐⭐ (5점)</option>
          <option value="4" th:selected="${book.rating == 4}">⭐⭐⭐⭐ (4점)</option>
          <option value="3" th:selected="${book.rating == 3}">⭐⭐⭐ (3점)</option>
          <option value="2" th:selected="${book.rating == 2}">⭐⭐ (2점)</option>
          <option value="1" th:selected="${book.rating == 1}">⭐ (1점)</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="summary" class="form-label fw-semibold">한줄평</label>
        <input type="text" id="summary" name="summary" class="form-control" th:value="${book.summary}">
      </div>

      <div class="mb-4">
        <label for="memo" class="form-label fw-semibold">메모</label>
        <textarea id="memo" name="memo" rows="5" class="form-control" th:text="${book.memo}"></textarea>
      </div>

      <hr class="my-4">

      <div class="d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-outline-secondary px-4 fw-bold" th:onclick="|location.href='@{/books/{bookId}(bookId=${book.id})}'|">
          취소
        </button>
        <button type="submit" class="btn btn-primary px-4 fw-bold shadow-sm">
          저장하기
        </button>
      </div>

    </form>
  </section>
</main>

<footer th:replace="~{fragment/base :: mainFooter}"></footer>
</body>
</html>
