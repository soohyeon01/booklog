<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 책 등록 - BookLog</title>
</head>
<body>

<header th:replace="~{fragment/base :: mainHeader('➕ 새 책 등록하기 (v1.2)')}"></header>

<main>
    <section>
        <form th:action="@{/books/add}" method="post">
            <table border="1">
                <tbody>
                <tr>
                    <td><label for="title"><strong>제목 *</strong></label></td>
                    <td><input type="text" id="title" name="title" required placeholder="책 제목을 입력하세요"></td>
                </tr>
                <tr>
                    <td><label for="author">저자</label></td>
                    <td><input type="text" id="author" name="author" placeholder="저자 이름을 입력하세요"></td>
                </tr>
                <tr>
                    <td><label>독서 상태</label></td>
                    <td>
                        <input type="radio" id="statusWish" name="status" value="WISH" checked>
                        <label for="statusWish">읽고 싶은 책</label>
                        <input type="radio" id="statusReading" name="status" value="READING">
                        <label for="statusReading">읽는 중</label>
                        <input type="radio" id="statusDone" name="status" value="DONE">
                        <label for="statusDone">완독</label>
                    </td>
                </tr>
                <tr>
                    <td><label for="rating">평점</label></td>
                    <td>
                        <select id="rating" name="rating">
                            <option value="5">⭐⭐⭐⭐⭐ (5점)</option>
                            <option value="4">⭐⭐⭐⭐ (4점)</option>
                            <option value="3">⭐⭐⭐ (3점)</option>
                            <option value="2">⭐⭐ (2점)</option>
                            <option value="1">⭐ (1점)</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td><label for="summary">한줄평</label></td>
                    <td><input type="text" id="summary" name="summary" style="width: 300px;" placeholder="가벼운 소감을 적어주세요"></td>
                </tr>
                <tr>
                    <td><label for="memo">메모</label></td>
                    <td><textarea id="memo" name="memo" rows="5" cols="40" placeholder="길게 남길 회고를 입력하세요"></textarea></td>
                </tr>
                </tbody>
            </table>
            <br>
            <button type="submit">🚀 등록하기</button>
            <button type="button" th:onclick="|location.href='@{/books}'|">취소</button>
        </form>
    </section>
</main>
<footer th:replace="~{fragment/base :: mainFooter}"></footer>
</body>
</html>
